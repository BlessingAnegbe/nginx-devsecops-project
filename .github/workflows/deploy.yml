name: Deploy to EC2
  uses: appleboy/ssh-action@v1.0.3
  with:
    host: ${{ secrets.EC2_HOST }}
    username: ${{ secrets.EC2_USER }}
    key: ${{ secrets.EC2_SSH_KEY }}
    script: |
      set -e

      docker stop nginx-app || true
      docker rm nginx-app || true

      docker pull nginx:latest

      docker run -d \
        --name nginx-app \
        -p 80:80 \
        nginx:latest
