name: Nginx CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-scan-deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Build Docker Image
      run: |
        docker build -t nginx-app .

    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install wget -y
        wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.65.0_Linux-64bit.deb
        sudo dpkg -i trivy_0.65.0_Linux-64bit.deb

    - name: Scan Docker Image
      run: |
        trivy image nginx-app

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker stop nginx-app || true
          docker rm nginx-app || true

          docker pull nginx:latest

          docker run -d \
            --name nginx-app \
            -p 80:80 \
            nginx:latest
